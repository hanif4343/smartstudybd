name: Build Smart Study APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      # ── Gradle install + wrapper generate ──
      - name: Install Gradle & generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          export GRADLE_BIN="/tmp/gradle-8.4/bin/gradle"
          chmod +x "$GRADLE_BIN"

          mkdir -p gradle/wrapper
          "$GRADLE_BIN" wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

          echo "✅ Wrapper generated:"
          ls -lh gradle/wrapper/

      # ── google-services.json ──
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > app/google-services.json

      # ── Bengali fonts ──
      - name: Download Noto Sans Bengali fonts
        run: |
          mkdir -p app/src/main/res/font
          BASE="https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSansBengali"
          curl -fsSL "${BASE}/NotoSansBengali-Regular.ttf"   -o app/src/main/res/font/noto_sans_bengali_regular.ttf
          curl -fsSL "${BASE}/NotoSansBengali-Medium.ttf"    -o app/src/main/res/font/noto_sans_bengali_medium.ttf
          curl -fsSL "${BASE}/NotoSansBengali-SemiBold.ttf"  -o app/src/main/res/font/noto_sans_bengali_semibold.ttf
          curl -fsSL "${BASE}/NotoSansBengali-Bold.ttf"      -o app/src/main/res/font/noto_sans_bengali_bold.ttf
          curl -fsSL "${BASE}/NotoSansBengali-ExtraBold.ttf" -o app/src/main/res/font/noto_sans_bengali_extrabold.ttf
          ls -lh app/src/main/res/font/

      # ── App icons ──
      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${entry%%:*}"
            px="${entry##*:}"
            dir="app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert -size "${px}x${px}" xc:"#4F46E5" \
              -fill white -font DejaVu-Sans-Bold \
              -pointsize $((px * 35 / 100)) \
              -gravity Center -annotate 0 "SS" \
              "${dir}/ic_launcher.png" 2>/dev/null || \
            python3 -c "
          import struct,zlib
          w,h=$px,$px
          raw=b''.join(b'\x00'+bytes([79,70,229]*w) for _ in range(h))
          c=zlib.compress(raw)
          def ch(t,d):
              return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
          png=b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+ch(b'IDAT',c)+ch(b'IEND',b'')
          open('${dir}/ic_launcher.png','wb').write(png)
          "
            cp "${dir}/ic_launcher.png" "${dir}/ic_launcher_round.png"
            cp "${dir}/ic_launcher.png" "${dir}/ic_launcher_foreground.png"
          done
          echo "Icons done"

      # ── Inject secrets ──
      - name: Inject API keys
        run: |
          sed -i 's|%%GAS_URL%%|${{ secrets.GAS_URL }}|g'               app/build.gradle
          sed -i 's|%%FIREBASE_URL%%|${{ secrets.FIREBASE_URL }}|g'     app/build.gradle
          sed -i 's|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g' app/build.gradle

      # ── Auto versionCode ──
      - name: Set versionCode
        run: sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle

      # ── Keystore ──
      # এখানে ফাইলের নাম পরিবর্তন করে 'smartstudy.jks' করা হয়েছে
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > app/smartstudy.jks

      # ── Build Debug ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # ── Build Signed Release ──
      # এখানে আপনার নতুন কিস্টোর ফাইল এবং alias 'hanif' সঠিকভাবে ম্যাপ করা হয়েছে
      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: "smartstudy.jks"
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: "hanif-alias"
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          find app/build/outputs/apk/release -name "*.apk" | head -5
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            mv "$APK" app/build/outputs/apk/release/SmartStudy.apk
            echo "Renamed: $APK -> SmartStudy.apk"
          else
            echo "No release APK found!"
            exit 1
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/SmartStudy.apk
          if-no-files-found: error

      # ── GitHub Release ──
      - name: Get version
        id: ver
        run: |
          VN=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          echo "tag=v${VN}-b${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "title=Smart Study v${VN} (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name:     ${{ steps.ver.outputs.title }}
          body: |
            ## 📚 Smart Study

            নিচের **SmartStudy.apk** ডাউনলোড করো।
            > Settings → Unknown sources চালু করে install করো।

            🔨 Build \#${{ github.run_number }} | 💬 ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/SmartStudy.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
