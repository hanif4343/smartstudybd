name: Reset User Password

# "পাসওয়ার্ড ভুলে গেছি" রিকোয়েস্ট এলে এটা manually run করো (Actions ট্যাব →
# "Reset User Password" → Run workflow → ফোন নম্বর/email আর নতুন পাসওয়ার্ড দাও)।

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'ফোন নম্বর (01xxxxxxxxx) অথবা email (Google account এর জন্য)'
        required: true
        type: string
      newPassword:
        description: 'নতুন পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)'
        required: true
        type: string

jobs:
  reset:
    runs-on: ubuntu-latest
    env:
      FIREBASE_ADMIN_PROJECT_ID:   ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
      FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
      FIREBASE_ADMIN_PRIVATE_KEY:  ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
      TARGET_PHONE: ${{ github.event.inputs.phone }}
      NEW_PASSWORD: ${{ github.event.inputs.newPassword }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin@12

      - name: Reset password
        run: node scripts/reset-password.js
